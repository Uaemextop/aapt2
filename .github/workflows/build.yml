name: Build aapt2

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Reason'     
        required: false
        default: 'Update package'

jobs:
  build-linux:
    name: build-linux-${{ matrix.target_arch }}
    runs-on: [ubuntu-latest]
    permissions:
      id-token: write
      attestations: write
    strategy:
      matrix:
        target_arch: [x86_64, x86]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync submodules to Android 16 tag
        run: |
          git submodule sync --recursive
          git submodule update --init --depth 1

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build \
            automake \
            autoconf \
            libtool \
            build-essential \
            cmake \
            nasm \
            zlib1g-dev \
            pkg-config \
            git \
            curl \
            wget \
            unzip \
            zip \
            python3 \
            python3-pip \
            flex \
            bison \
            libgtest-dev \
            libgoogle-glog-dev \
            libprotobuf-dev \
            protobuf-compiler \
            libssl-dev \
            libexpat1-dev \
            libpng-dev \
            libpcre2-dev \
            liblzma-dev \
            libbz2-dev \
            libfmt-dev \
            libsqlite3-dev \
            libxml2-dev \
            libxml2-utils \
            openjdk-17-jdk-headless
          if [[ "${{ matrix.target_arch }}" == "x86" ]]; then
            sudo apt-get install -y \
              gcc-multilib \
              g++-multilib \
              lib32z1-dev \
              lib32stdc++6
          fi

      - name: Install Android NDK (r27 – Android 16 / API 36)
        run: |
          export ANDROID_NDK_VERSION=r27c
          wget -q "https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip" -O /tmp/ndk.zip
          sudo mkdir -p /opt/android-sdk/ndk
          sudo unzip -q /tmp/ndk.zip -d /opt/android-sdk/ndk
          rm /tmp/ndk.zip
          echo "ANDROID_NDK_HOME=/opt/android-sdk/ndk/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV
          echo "ANDROID_NDK=/opt/android-sdk/ndk/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV
          echo "/opt/android-sdk/ndk/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_PATH

      - name: Build aapt2 for Linux
        run: ./build.sh ${{ matrix.target_arch }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: dist-linux-${{ matrix.target_arch }}
          subject-path: dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-${{ matrix.target_arch }}
          path: dist

  build-windows:
    name: build-windows-${{ matrix.target_arch }}
    runs-on: [ubuntu-latest]
    permissions:
      id-token: write
      attestations: write
    strategy:
      matrix:
        target_arch: [x86_64, x86]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync submodules to Android 16 tag
        run: |
          git submodule sync --recursive
          git submodule update --init --depth 1

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build \
            automake \
            autoconf \
            libtool \
            build-essential \
            cmake \
            nasm \
            zlib1g-dev \
            libz-mingw-w64-dev \
            pkg-config \
            git \
            curl \
            wget \
            unzip \
            zip \
            python3 \
            python3-pip \
            flex \
            bison \
            libgtest-dev \
            libgoogle-glog-dev \
            libprotobuf-dev \
            protobuf-compiler \
            libssl-dev \
            libexpat1-dev \
            libpng-dev \
            libpcre2-dev \
            liblzma-dev \
            libbz2-dev \
            libfmt-dev \
            libsqlite3-dev \
            libxml2-dev \
            libxml2-utils \
            openjdk-17-jdk-headless \
            mingw-w64-common \
            mingw-w64-tools
          if [[ "${{ matrix.target_arch }}" == "x86_64" ]]; then
            sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
          else
            sudo apt-get install -y gcc-mingw-w64-i686 g++-mingw-w64-i686
          fi

      - name: Install Android NDK (r27 – Android 16 / API 36)
        run: |
          export ANDROID_NDK_VERSION=r27c
          wget -q "https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip" -O /tmp/ndk.zip
          sudo mkdir -p /opt/android-sdk/ndk
          sudo unzip -q /tmp/ndk.zip -d /opt/android-sdk/ndk
          rm /tmp/ndk.zip
          echo "ANDROID_NDK_HOME=/opt/android-sdk/ndk/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV
          echo "ANDROID_NDK=/opt/android-sdk/ndk/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV
          echo "/opt/android-sdk/ndk/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_PATH

      - name: Build aapt2 for Windows
        run: ./build_windows.sh ${{ matrix.target_arch }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: dist-windows-${{ matrix.target_arch }}
          subject-path: dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows-${{ matrix.target_arch }}
          path: dist
