name: Build aapt2

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Reason'     
        required: false
        default: 'Update package'

jobs:
  build-linux:
    name: build-linux-${{ matrix.target_arch }}
    runs-on: [ubuntu-latest]
    permissions:
      id-token: write
      attestations: write
    strategy:
      matrix:
        target_arch: [x86_64, x86]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync submodules to Android 16 tag
        run: |
          git submodule sync --recursive
          git submodule update --init --depth 1

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -y
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            ccache \
            curl \
            flex \
            g++-multilib \
            gcc-multilib \
            git \
            git-lfs \
            gnupg \
            gperf \
            imagemagick \
            lib32readline-dev \
            lib32z1-dev \
            libdw-dev \
            libelf-dev \
            libgnutls28-dev \
            libsdl1.2-dev \
            libssl-dev \
            libxml2 \
            libxml2-utils \
            lz4 \
            lzop \
            pngcrush \
            protobuf-compiler \
            python3 \
            python3-protobuf \
            rsync \
            schedtool \
            squashfs-tools \
            xsltproc \
            zip \
            zlib1g-dev \
            ninja-build \
            automake \
            autoconf \
            libtool \
            nasm \
            pkg-config \
            wget \
            unzip \
            python3-pip \
            libgtest-dev \
            libgoogle-glog-dev \
            libprotobuf-dev \
            libexpat1-dev \
            libpng-dev \
            libpcre2-dev \
            liblzma-dev \
            libbz2-dev \
            libfmt-dev \
            libsqlite3-dev \
            libxml2-dev \
            openjdk-17-jdk-headless
          if [[ "${{ matrix.target_arch }}" == "x86" ]]; then
            sudo apt-get install -y lib32stdc++6
          fi

      - name: Install cmake and SDK 36 from Android SDK (sdkmanager)
        run: |
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          SDKMANAGER="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --licenses > /dev/null 2>&1 || true
          $SDKMANAGER "cmake;3.22.1" "platforms;android-36" "sources;android-36"
          SDK_CMAKE="${SDK_ROOT}/cmake/3.22.1/bin"
          echo "${SDK_CMAKE}" >> $GITHUB_PATH
          echo "CMAKE_BIN=${SDK_CMAKE}/cmake" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${SDK_ROOT}" >> $GITHUB_ENV
          echo "${SDK_ROOT}/platform-tools" >> $GITHUB_PATH

      - name: Install Android NDK (r27 - Android 16 / API 36)
        run: |
          export ANDROID_NDK_VERSION=r27c
          wget -q "https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip" -O /tmp/ndk.zip
          sudo mkdir -p /opt/android-sdk/ndk
          sudo unzip -q /tmp/ndk.zip -d /opt/android-sdk/ndk
          rm /tmp/ndk.zip
          echo "ANDROID_NDK_HOME=/opt/android-sdk/ndk/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV
          echo "ANDROID_NDK=/opt/android-sdk/ndk/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV
          echo "/opt/android-sdk/ndk/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_PATH

      - name: Build aapt2 for Linux
        run: ./build.sh ${{ matrix.target_arch }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: dist-linux-${{ matrix.target_arch }}
          subject-path: dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-${{ matrix.target_arch }}
          path: dist

  build-windows:
    name: build-windows-${{ matrix.target_arch }}
    runs-on: [ubuntu-latest]
    permissions:
      id-token: write
      attestations: write
    strategy:
      matrix:
        target_arch: [x86_64, x86]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync submodules to Android 16 tag
        run: |
          git submodule sync --recursive
          git submodule update --init --depth 1

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -y
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            ccache \
            curl \
            flex \
            git \
            git-lfs \
            gnupg \
            gperf \
            imagemagick \
            lib32readline-dev \
            lib32z1-dev \
            libdw-dev \
            libelf-dev \
            libgnutls28-dev \
            libsdl1.2-dev \
            libssl-dev \
            libxml2 \
            libxml2-utils \
            lz4 \
            lzop \
            pngcrush \
            protobuf-compiler \
            python3 \
            python3-protobuf \
            rsync \
            schedtool \
            squashfs-tools \
            xsltproc \
            zip \
            zlib1g-dev \
            libz-mingw-w64-dev \
            ninja-build \
            automake \
            autoconf \
            libtool \
            nasm \
            pkg-config \
            wget \
            unzip \
            python3-pip \
            libgtest-dev \
            libgoogle-glog-dev \
            libprotobuf-dev \
            libexpat1-dev \
            libpng-dev \
            libpcre2-dev \
            liblzma-dev \
            libbz2-dev \
            libfmt-dev \
            libsqlite3-dev \
            libxml2-dev \
            openjdk-17-jdk-headless \
            mingw-w64-common \
            mingw-w64-tools
          if [[ "${{ matrix.target_arch }}" == "x86_64" ]]; then
            sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
          else
            sudo apt-get install -y gcc-mingw-w64-i686 g++-mingw-w64-i686
          fi

      - name: Install cmake and SDK 36 from Android SDK (sdkmanager)
        run: |
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          SDKMANAGER="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --licenses > /dev/null 2>&1 || true
          $SDKMANAGER "cmake;3.22.1" "platforms;android-36" "sources;android-36"
          SDK_CMAKE="${SDK_ROOT}/cmake/3.22.1/bin"
          echo "${SDK_CMAKE}" >> $GITHUB_PATH
          echo "CMAKE_BIN=${SDK_CMAKE}/cmake" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${SDK_ROOT}" >> $GITHUB_ENV
          echo "${SDK_ROOT}/platform-tools" >> $GITHUB_PATH

      - name: Install Android NDK (r27 - Android 16 / API 36)
        run: |
          export ANDROID_NDK_VERSION=r27c
          wget -q "https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip" -O /tmp/ndk.zip
          sudo mkdir -p /opt/android-sdk/ndk
          sudo unzip -q /tmp/ndk.zip -d /opt/android-sdk/ndk
          rm /tmp/ndk.zip
          echo "ANDROID_NDK_HOME=/opt/android-sdk/ndk/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV
          echo "ANDROID_NDK=/opt/android-sdk/ndk/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV
          echo "/opt/android-sdk/ndk/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_PATH

      - name: Build aapt2 for Windows
        run: ./build_windows.sh ${{ matrix.target_arch }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: dist-windows-${{ matrix.target_arch }}
          subject-path: dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows-${{ matrix.target_arch }}
          path: dist
