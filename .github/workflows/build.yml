name: Build aapt2

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Reason'     
        required: false
        default: 'Update package'

jobs:
  build-linux:
    name: build-linux-${{ matrix.target_arch }}
    runs-on: [mp4]
    permissions:
      id-token: write
      attestations: write
    strategy:
      matrix:
        target_arch: [x86_64, x86]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync submodules to Android 16 tag
        run: |
          git submodule sync --recursive
          git submodule update --init --depth 1

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build \
            automake \
            autoconf \
            libtool \
            build-essential \
            cmake \
            nasm \
            zlib1g-dev
          if [[ "${{ matrix.target_arch }}" == "x86" ]]; then
            sudo apt-get install -y gcc-multilib g++-multilib
          fi

      - name: Build aapt2 for Linux
        run: ./build.sh ${{ matrix.target_arch }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: dist-linux-${{ matrix.target_arch }}
          subject-path: dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-${{ matrix.target_arch }}
          path: dist

  build-windows:
    name: build-windows-${{ matrix.target_arch }}
    runs-on: [mp4]
    permissions:
      id-token: write
      attestations: write
    strategy:
      matrix:
        target_arch: [x86_64, x86]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync submodules to Android 16 tag
        run: |
          git submodule sync --recursive
          git submodule update --init --depth 1

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build \
            automake \
            autoconf \
            libtool \
            build-essential \
            cmake \
            nasm \
            zlib1g-dev
          if [[ "${{ matrix.target_arch }}" == "x86_64" ]]; then
            sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
          else
            sudo apt-get install -y gcc-mingw-w64-i686 g++-mingw-w64-i686
          fi

      - name: Build aapt2 for Windows
        run: ./build_windows.sh ${{ matrix.target_arch }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: dist-windows-${{ matrix.target_arch }}
          subject-path: dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows-${{ matrix.target_arch }}
          path: dist
